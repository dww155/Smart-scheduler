name: Publish backend Maven package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: maven-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: server/smart-scheduler

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 21 and Maven
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: server/smart-scheduler/pom.xml
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build, test, and publish to GitHub Packages
        run: >-
          ./mvnw --batch-mode --no-transfer-progress clean deploy
          -DaltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
