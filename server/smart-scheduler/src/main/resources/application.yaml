server:
  port: 8080
  servlet:
    context-path: /smart-scheduler

spring:
  application:
    name: smart-scheduler

  datasource:
    url: jdbc:postgresql://localhost:5432/smart-scheduler
    username: postgres
    password: root

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.dww.chat_app: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

jwt:
  secret: aWNld2lzaHJhdGhlcm5vYm9keWRyYXdwcm92aWRlaHVuZHJlZHBhc3R0cnlzZW50cHU=
  expiry-time: 3600         #seconds
  refreshable-time: 604800  #seconds